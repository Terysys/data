<!DOCTYPE html>
<html>
<head>
<style>
  table {
    font-family: Arial, sans-serif;
    border-collapse: collapse;
    width: 100%;
  }
  td, th {
    border: 1px solid #dddddd;
    text-align: left;
    padding: 12px;
  }
  tr:nth-child(even) {
    background-color: #f9f9f9;
  }
  .action-buttons {
    display: flex;
    gap: 10px;
  }
  .btn {
    padding: 6px 12px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
  }
  .btn-edit { background-color: #4CAF50; color: white; }
  .btn-delete { background-color: #f44336; color: white; }
  .btn:hover { opacity: 0.8; }
</style>
</head>
<body>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>User Name</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>001</td>
      <td>Jane Doe</td>
      <td>Active</td>
      <td class="action-buttons">
        <button class="btn btn-edit" onclick="editRow(1)">Edit</button>
        <button class="btn btn-delete" onclick="deleteRow(1)">Delete</button>
      </td>
    </tr>
    <tr>
      <td>002</td>
      <td>John Smith</td>
      <td>Pending</td>
      <td class="action-buttons">
        <button class="btn btn-edit" onclick="editRow(2)">Edit</button>
        <button class="btn btn-delete" onclick="deleteRow(2)">Delete</button>
      </td>
    </tr>
  </tbody>
</table>

<script>
  function editRow(id) { alert('Editing row: ' + id); }
  function deleteRow(id) { alert('Deleting row: ' + id); }
</script>

</body>
</html>
